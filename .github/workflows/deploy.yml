name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_IMAGE: realdeal-ai/backend
  FRONTEND_IMAGE: realdeal-ai/frontend

jobs:
  # -------------------------------------------------------------------
  # Determine environment
  # -------------------------------------------------------------------
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.env.outputs.image_tag }}

    steps:
      - name: Determine environment and tag
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  # -------------------------------------------------------------------
  # Run CI first
  # -------------------------------------------------------------------
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yml

  # -------------------------------------------------------------------
  # Build and push Docker images to ECR
  # -------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [prepare, ci]
    environment: ${{ needs.prepare.outputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ needs.prepare.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ENVIRONMENT=${{ needs.prepare.outputs.environment }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ needs.prepare.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ vars.API_URL }}

  # -------------------------------------------------------------------
  # Run database migrations
  # -------------------------------------------------------------------
  migrate:
    name: Database Migrations
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    environment: ${{ needs.prepare.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Alembic migrations
        run: |
          aws ecs run-task \
            --cluster realdeal-${{ needs.prepare.outputs.environment }} \
            --task-definition realdeal-migrate-${{ needs.prepare.outputs.environment }} \
            --launch-type FARGATE \
            --network-configuration '{
              "awsvpcConfiguration": {
                "subnets": ${{ secrets.PRIVATE_SUBNET_IDS }},
                "securityGroups": ["${{ secrets.ECS_SECURITY_GROUP }}"],
                "assignPublicIp": "DISABLED"
              }
            }' \
            --overrides '{
              "containerOverrides": [{
                "name": "migrate",
                "command": ["alembic", "upgrade", "head"],
                "environment": [
                  {"name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}"}
                ]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text

      - name: Wait for migration to complete
        run: |
          TASK_ARN=$(aws ecs list-tasks \
            --cluster realdeal-${{ needs.prepare.outputs.environment }} \
            --family realdeal-migrate-${{ needs.prepare.outputs.environment }} \
            --desired-status STOPPED \
            --query 'taskArns[0]' \
            --output text)
          if [ "$TASK_ARN" != "None" ]; then
            echo "Migration task completed: $TASK_ARN"
          fi

  # -------------------------------------------------------------------
  # Deploy to ECS
  # -------------------------------------------------------------------
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push, migrate]
    environment: ${{ needs.prepare.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS backend service
        run: |
          aws ecs update-service \
            --cluster realdeal-${{ needs.prepare.outputs.environment }} \
            --service realdeal-backend-${{ needs.prepare.outputs.environment }} \
            --force-new-deployment \
            --desired-count 2

      - name: Update ECS frontend service
        run: |
          aws ecs update-service \
            --cluster realdeal-${{ needs.prepare.outputs.environment }} \
            --service realdeal-frontend-${{ needs.prepare.outputs.environment }} \
            --force-new-deployment \
            --desired-count 2

      - name: Update ECS worker service
        run: |
          aws ecs update-service \
            --cluster realdeal-${{ needs.prepare.outputs.environment }} \
            --service realdeal-worker-${{ needs.prepare.outputs.environment }} \
            --force-new-deployment \
            --desired-count 2

      - name: Wait for backend service stability
        run: |
          aws ecs wait services-stable \
            --cluster realdeal-${{ needs.prepare.outputs.environment }} \
            --services realdeal-backend-${{ needs.prepare.outputs.environment }}
        timeout-minutes: 10

      - name: Wait for frontend service stability
        run: |
          aws ecs wait services-stable \
            --cluster realdeal-${{ needs.prepare.outputs.environment }} \
            --services realdeal-frontend-${{ needs.prepare.outputs.environment }}
        timeout-minutes: 10

      - name: Health check
        run: |
          API_URL="${{ vars.API_URL }}"
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

  # -------------------------------------------------------------------
  # Notify via Slack
  # -------------------------------------------------------------------
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    if: always()

    steps:
      - name: Notify Slack on success
        if: needs.deploy.result == 'success'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "RealDeal AI deployed successfully to ${{ needs.prepare.outputs.environment }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *RealDeal AI deployed to ${{ needs.prepare.outputs.environment }}*\n\n*Commit:* `${{ github.sha }}`\n*Branch:* `${{ github.ref_name }}`\n*Author:* ${{ github.actor }}\n*Message:* ${{ github.event.head_commit.message }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: needs.deploy.result == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "RealDeal AI deployment FAILED for ${{ needs.prepare.outputs.environment }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *RealDeal AI deployment FAILED to ${{ needs.prepare.outputs.environment }}*\n\n*Commit:* `${{ github.sha }}`\n*Branch:* `${{ github.ref_name }}`\n*Author:* ${{ github.actor }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
