[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring external services
    unit: marks pure unit tests
addopts =
    -v
    --strict-markers
    --tb=short
    -q
filterwarnings =
    ignore::DeprecationWarning
