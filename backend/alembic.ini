# =============================================================================
# Alembic Configuration — RealDeal AI
# =============================================================================

[alembic]
# Path to migration scripts (relative to this file)
script_location = migrations

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Truncate long revision in filenames
truncate_slug_length = 40

# Timezone for revision creation dates
timezone = UTC

# SQLAlchemy connection string (overridden by DATABASE_URL env var in env.py)
sqlalchemy.url = postgresql+asyncpg://realdeal:realdeal@localhost:5432/realdeal

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
