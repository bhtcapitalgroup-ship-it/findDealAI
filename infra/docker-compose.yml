version: "3.9"

x-backend-common: &backend-common
  build:
    context: ../backend
    dockerfile: ../infra/Dockerfile.backend
  env_file:
    - .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - realdeal-net
  restart: unless-stopped

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — primary data store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: realdeal-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-realdeal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-realdeal}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-realdeal} -d ${POSTGRES_DB:-realdeal}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - realdeal-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7 — cache, Celery broker, rate-limit counters
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: realdeal-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realdeal-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend — FastAPI application server
  # ---------------------------------------------------------------------------
  backend:
    <<: *backend-common
    container_name: realdeal-backend
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers ${BACKEND_WORKERS:-4}
      --loop uvloop
      --http httptools
      --log-level ${LOG_LEVEL:-info}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../backend:/app:cached
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Celery Worker — async task processing (scraping, analysis, emails)
  # ---------------------------------------------------------------------------
  celery-worker:
    <<: *backend-common
    container_name: realdeal-celery-worker
    command: >
      celery -A app.worker.celery_app worker
      --loglevel=${LOG_LEVEL:-info}
      --concurrency=${CELERY_CONCURRENCY:-4}
      --max-tasks-per-child=100
      --queues=default,scraping,analysis,alerts
      --without-heartbeat
      --without-mingle
    volumes:
      - ../backend:/app:cached
    deploy:
      resources:
        limits:
          memory: 2G

  # ---------------------------------------------------------------------------
  # Celery Beat — periodic task scheduler
  # ---------------------------------------------------------------------------
  celery-beat:
    <<: *backend-common
    container_name: realdeal-celery-beat
    command: >
      celery -A app.worker.celery_app beat
      --loglevel=${LOG_LEVEL:-info}
      --schedule=/tmp/celerybeat-schedule
    volumes:
      - ../backend:/app:cached

  # ---------------------------------------------------------------------------
  # Frontend — Next.js application
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    container_name: realdeal-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - realdeal-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy (optional, enable for production-like setup)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: realdeal-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - realdeal-net
    restart: unless-stopped
    profiles:
      - with-nginx

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local

networks:
  realdeal-net:
    driver: bridge
